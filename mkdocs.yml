site_name: SODA.dev

theme:
  name: material
  language: ja
  logo: assets/logo.svg  # ロゴファイルのパス（後で実際のファイル名に変更）
  favicon: assets/favicon.png  # ファビコンのパス（後で実際のファイル名に変更）
  features:
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - content.tabs.link          # タブ切替を強化

plugins:
  - search
  - glightbox

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Findy/soda.dev
      name: GitHub

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/detail-toc.js
  - javascripts/navigation.js
  - javascripts/knowledge-map-modal.js

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      toc_depth: 3
  - footnotes
  - tables
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.tabbed:              # タブ機能を有効化
      alternate_style: true
